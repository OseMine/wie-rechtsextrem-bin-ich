<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rechtsextreme Einstellungen – Test</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body>

<div id="app">
  <div id="top-bar">
    <div id="lang-group">
      <select id="lang-select">
        <option value="de">Deutsch</option>
        <option value="en">English</option>
      </select>
      <select id="variant-select">
        <option value="standard">Standard</option>
        <option value="ls">Leichte Sprache</option>
      </select>
    </div>
    <button id="theme-toggle">&#9790;</button>
  </div>

  <div id="welcome-screen" class="screen active">
    <div class="card">
      <h1 id="welcome-title"></h1>
      <p class="subtitle" id="welcome-subtitle"></p>
      <p class="desc" id="welcome-desc"></p>
      <ul class="scale-info" id="welcome-scale"></ul>
      <p class="disclaimer" id="welcome-disclaimer"></p>
      <button id="start-btn" class="btn btn-primary"></button>
    </div>
  </div>

  <div id="test-screen" class="screen">
    <div id="progress-container">
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <div id="progress-text"></div>
    </div>
    <div class="card" id="question-card">
      <h2 id="dimension-title"><span id="question-number-badge"></span><span id="dimension-name"></span></h2>
      <div id="questions-container"></div>
      <div class="nav-buttons">
        <button id="prev-btn" class="btn btn-secondary" disabled></button>
        <button id="next-btn" class="btn btn-primary"></button>
      </div>
    </div>
  </div>

  <div id="results-screen" class="screen">
    <div class="card results-card">
      <h1 id="results-title"></h1>
      <div id="overall-result"></div>
      <button id="toggle-details-btn" class="btn btn-outline"></button>
      <div id="details-section" class="hidden">
        <div id="dimension-results"></div>
        <div id="score-details"></div>
      </div>
      <div id="help-btn-container"></div>
      <button id="restart-btn" class="btn btn-primary"></button>
    </div>
  </div>

  <div id="help-screen" class="screen">
    <div class="card">
      <h1 id="help-title"></h1>
      <p class="desc" id="help-desc"></p>

      <div class="help-map-wrap"><div id="help-map"></div></div>
      <p class="help-map-hint" id="help-map-hint"></p>

      <div id="help-entries"></div>

      <button id="help-back-btn" class="btn btn-primary"></button>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  let map = null;
  async function initMap() {
    if (map) return;
    const isDark = document.documentElement.classList.contains("dark");
    const tileUrl = isDark
      ? "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png"
      : "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png";
    const attr = isDark
      ? "&copy; <a href='https://www.openstreetmap.org/copyright'>OSM</a> &copy; <a href='https://carto.com/'>CARTO</a>"
      : "&copy; <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a>";

    map = L.map("help-map").setView([51.5, 10], 5);
    L.tileLayer(tileUrl, { maxZoom: 18, attribution: attr }).addTo(map);

    const res = await fetch("help_centers.json");
    const centers = await res.json();

    centers.forEach(c => {
      L.marker([c.lat, c.lon])
        .addTo(map)
        .bindPopup(`<a href="${c.url}" target="_blank" rel="noopener"><strong>${c.name}</strong></a>`);
    });

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => map.setView([pos.coords.latitude, pos.coords.longitude], 7),
        () => {}
      );
    }
  }

  const observer = new MutationObserver(() => {
    if (document.getElementById("help-screen").classList.contains("active") && !map) {
      setTimeout(initMap, 300);
    }
  });
  observer.observe(document.getElementById("help-screen"), { attributes: true, attributeFilter: ["class"] });
});
</script>
</body>
</html>
